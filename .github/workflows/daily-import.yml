name: Napi import

on:
  schedule:
    - cron: '30 6 * * *'  # 6:30 UTC — after scoresheet + PBP CIs (6:00)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python csomagok telepítése
        run: pip install requests beautifulsoup4

      - name: Scoresheet repo klónozása
        run: git clone --depth 1 https://github.com/pozsikdani/mkosz-scoresheet.git /tmp/mkosz-scoresheet

      - name: PBP repo klónozása
        run: git clone --depth 1 https://github.com/pozsikdani/mkosz-play-by-play.git /tmp/mkosz-pbp

      - name: Scoresheet import
        run: python3 cli.py import scoresheet /tmp/mkosz-scoresheet/scoresheet.sqlite

      - name: PBP import
        run: python3 cli.py import pbp /tmp/mkosz-pbp/pbp.sqlite

      - name: Web import (standings + rosters)
        run: python3 cli.py import web

      - name: Shotchart import (mkosz.hu/ajax/film.php)
        # API néha ConnectTimeout-tal hibázik — ne álljon le miatta a pipeline.
        continue-on-error: true
        run: python3 cli.py import shotchart --all

      - name: Indexek levétele + VACUUM (GitHub 100MB limit alatt maradás)
        run: |
          BEFORE=$(stat -c%s mkosz_stats.sqlite)
          # Custom indexek ~21 MB-ot tesznek ki. A consumer (scout-web)
          # klónozás után újraépíti őket — lásd mkosz-scout-web/.github/workflows/daily-update.yml.
          sqlite3 mkosz_stats.sqlite <<'SQL'
          DROP INDEX IF EXISTS idx_matches_comp;
          DROP INDEX IF EXISTS idx_matches_date;
          DROP INDEX IF EXISTS idx_pbp_gamecode;
          DROP INDEX IF EXISTS idx_pbp_playercode;
          DROP INDEX IF EXISTS idx_pf_gamecode;
          DROP INDEX IF EXISTS idx_pgs_gamecode;
          DROP INDEX IF EXISTS idx_pgs_playercode;
          DROP INDEX IF EXISTS idx_player_names_variant;
          DROP INDEX IF EXISTS idx_rosters_team;
          DROP INDEX IF EXISTS idx_se_gamecode;
          DROP INDEX IF EXISTS idx_shots_gamecode;
          DROP INDEX IF EXISTS idx_shots_playercode;
          DROP INDEX IF EXISTS idx_subs_gamecode;
          DROP INDEX IF EXISTS idx_team_aliases_team;
          VACUUM;
          SQL
          AFTER=$(stat -c%s mkosz_stats.sqlite)
          echo "DB size: $(echo "scale=1; $BEFORE/1048576" | bc) MB → $(echo "scale=1; $AFTER/1048576" | bc) MB"

      - name: Commit és push ha változott
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mkosz_stats.sqlite
          git diff --staged --quiet || (
            git commit -m "Napi import (auto): $(date +%Y-%m-%d)" &&
            git push
          )
